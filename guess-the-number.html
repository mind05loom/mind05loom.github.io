<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guess the Number</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Quicksand:wght@400;600;700&display=swap');

  :root {
    --bg:#0a0a1a;--card:#12122a;
    --accent:#00d4ff;--accent-glow:rgba(0,212,255,0.3);
    --text:#e8e8f0;--muted:#6a6a8a;
    --danger:#ff3860;--success:#00e676;--warning:#ffab00;
    --timer-bar:#00d4ff;--border:rgba(255,255,255,0.06);
  }
  .mode-easy{--accent:#00d4ff;--accent-glow:rgba(0,212,255,0.3);--timer-bar:#00d4ff;}
  .mode-medium{--accent:#b24aff;--accent-glow:rgba(178,74,255,0.3);--timer-bar:#b24aff;}
  .mode-hard{--accent:#ff3860;--accent-glow:rgba(255,56,96,0.3);--timer-bar:#ff3860;}

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;background:var(--bg);color:var(--text);
    font-family:'Quicksand',sans-serif;overflow-x:hidden;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    -webkit-text-size-adjust:100%;
  }
  body{
    display:flex;flex-direction:column;
    min-height:100vh;min-height:100dvh;
    background:
      radial-gradient(ellipse at 20% 0%,rgba(0,212,255,0.06) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 100%,rgba(178,74,255,0.05) 0%,transparent 60%),
      var(--bg);
  }

  /* Timer */
  #timer-track{position:fixed;top:0;left:0;right:0;height:5px;background:rgba(255,255,255,0.05);z-index:100;}
  #timer-bar{
    height:100%;width:100%;background:var(--timer-bar);
    box-shadow:0 0 14px var(--accent-glow);
    transition:width 0.3s linear,background 0.3s;border-radius:0 3px 3px 0;
  }
  #timer-bar.urgent{background:var(--danger);box-shadow:0 0 18px rgba(255,56,96,0.5);}

  .game-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:16px;}
  .game-wrap{
    width:100%;max-width:480px;margin:0 auto;
    padding:12px 16px 24px;
    display:flex;flex-direction:column;align-items:center;gap:13px;
  }

  /* Header */
  .header{text-align:center;width:100%;margin-top:10px;}
  .header h1{
    font-family:'Orbitron',monospace;
    font-size:clamp(1.2rem,4.5vw,1.7rem);font-weight:900;letter-spacing:2px;
    background:linear-gradient(135deg,var(--accent),#fff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;filter:drop-shadow(0 0 18px var(--accent-glow));
  }
  .header .sub{font-size:0.68rem;color:var(--muted);margin-top:2px;letter-spacing:1.5px;text-transform:uppercase;}

  /* Mode */
  .mode-row{display:flex;gap:6px;width:100%;justify-content:center;}
  .mode-btn{
    flex:1;max-width:120px;padding:8px 0;border:2px solid var(--border);
    border-radius:10px;background:var(--card);color:var(--muted);
    font-family:'Orbitron',monospace;font-size:0.65rem;font-weight:700;
    letter-spacing:1px;cursor:pointer;transition:all 0.25s;text-transform:uppercase;
    -webkit-user-select:none;user-select:none;
  }
  .mode-btn:hover{border-color:var(--accent);color:var(--text);}
  .mode-btn.active{
    border-color:var(--accent);
    background:linear-gradient(135deg,var(--accent-glow),transparent);
    color:#fff;box-shadow:0 0 20px var(--accent-glow),inset 0 0 20px var(--accent-glow);
  }

  /* Stats */
  .stats{
    display:flex;justify-content:space-between;align-items:center;
    width:100%;padding:8px 12px;background:var(--card);
    border-radius:14px;border:1px solid var(--border);
  }
  .hearts{display:flex;gap:4px;}
  .heart{font-size:1.25rem;transition:transform 0.3s,opacity 0.3s;filter:drop-shadow(0 0 4px rgba(255,56,96,0.4));}
  .heart.lost{opacity:0.15;transform:scale(0.7);filter:none;}
  .stat-label{font-size:0.55rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
  .stat-val{font-family:'Orbitron',monospace;font-size:0.95rem;font-weight:700;color:var(--accent);}

  /* Range */
  .range-display{
    font-family:'Orbitron',monospace;font-size:0.75rem;color:var(--muted);
    letter-spacing:2px;padding:4px 16px;border:1px dashed var(--border);border-radius:30px;
  }
  .range-display em{color:var(--accent);font-weight:700;font-style:normal;}

  /* Number display — PURE DIV, no input */
  #num-box{
    width:100%;max-width:260px;min-height:60px;
    padding:12px 20px;
    font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;
    text-align:center;background:var(--card);
    border:2px solid var(--border);border-radius:16px;
    color:#fff;display:flex;align-items:center;justify-content:center;
    transition:border-color 0.3s,box-shadow 0.3s;
    -webkit-user-select:none;user-select:none;
    letter-spacing:4px;cursor:pointer;
  }
  #num-box.active{border-color:var(--accent);box-shadow:0 0 24px var(--accent-glow);}
  .placeholder-txt{color:rgba(255,255,255,0.12);font-size:0.9rem;letter-spacing:2px;font-weight:600;}
  .blink-cursor{
    display:none;width:2px;height:1.4em;background:var(--accent);
    margin-left:3px;animation:blink 1s step-end infinite;
  }
  #num-box.active .blink-cursor{display:inline-block;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

  /* Hint */
  .hint-area{min-height:20px;font-size:0.72rem;color:var(--muted);font-weight:600;letter-spacing:0.5px;}
  .reveal-badge{
    display:inline-block;padding:3px 12px;background:rgba(255,171,0,0.15);
    border:1px solid var(--warning);border-radius:8px;color:var(--warning);
    font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;letter-spacing:2px;
  }

  /* Message */
  #message{
    min-height:44px;width:100%;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:10px 12px;background:var(--card);border-radius:12px;
    border:1px solid var(--border);font-size:0.88rem;font-weight:700;transition:all 0.3s;
  }
  #message.win{color:var(--success);border-color:var(--success);box-shadow:0 0 20px rgba(0,230,118,0.2);}
  #message.lose{color:var(--danger);border-color:var(--danger);box-shadow:0 0 20px rgba(255,56,96,0.2);}
  #message.hint-higher{color:#ff9100;}
  #message.hint-lower{color:#40c4ff;}

  /* Powerups */
  .pu-section{width:100%;text-align:center;}
  .pu-label{font-size:0.55rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
  .pu-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .pu{
    padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);
    background:var(--card);color:var(--muted);font-family:'Quicksand',sans-serif;
    font-size:0.68rem;font-weight:700;cursor:default;opacity:0.35;
    transition:all 0.3s;display:flex;align-items:center;gap:4px;
    -webkit-user-select:none;user-select:none;
  }
  .pu.avail{
    opacity:1;cursor:pointer;border-color:var(--warning);color:var(--warning);
    box-shadow:0 0 12px rgba(255,171,0,0.15);animation:pu-glow 1.5s infinite alternate;
  }
  .pu.avail:hover{background:rgba(255,171,0,0.1);transform:translateY(-1px);}
  .pu.used{opacity:0.2;text-decoration:line-through;}
  @keyframes pu-glow{from{box-shadow:0 0 8px rgba(255,171,0,0.1);}to{box-shadow:0 0 20px rgba(255,171,0,0.3);}}

  /* History */
  .hist{width:100%;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;min-height:24px;}
  .chip{
    padding:3px 9px;border-radius:20px;font-family:'Orbitron',monospace;
    font-size:0.65rem;font-weight:700;border:1px solid var(--border);
    background:var(--card);animation:chip-in 0.3s ease-out;
  }
  .chip.high{color:#ff9100;border-color:rgba(255,145,0,0.3);}
  .chip.low{color:#40c4ff;border-color:rgba(64,196,255,0.3);}
  @keyframes chip-in{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}

  /* Restart */
  #restart-btn{
    padding:8px 24px;border-radius:30px;border:2px solid var(--border);
    background:transparent;color:var(--muted);font-family:'Orbitron',monospace;
    font-size:0.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    cursor:pointer;transition:all 0.25s;-webkit-user-select:none;user-select:none;
  }
  #restart-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px var(--accent-glow);}

  /* ══════════════════════════════════════
     NUMPAD DRAWER
     ══════════════════════════════════════ */
  .pad-bg{
    position:fixed;inset:0;z-index:150;
    background:rgba(0,0,0,0.4);
    opacity:0;pointer-events:none;transition:opacity 0.25s;
  }
  .pad-bg.open{opacity:1;pointer-events:auto;}

  .pad-drawer{
    position:fixed;bottom:0;left:0;right:0;z-index:160;
    transform:translateY(100%);
    transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  .pad-drawer.open{transform:translateY(0);}

  .pad-inner{
    max-width:360px;margin:0 auto;
    padding:7px 14px 10px;
    background:linear-gradient(180deg,#18183d,#0f0f28);
    border-radius:18px 18px 0 0;
    border-top:1px solid rgba(255,255,255,0.1);
    box-shadow:0 -6px 32px rgba(0,0,0,0.6);
  }
  .pad-handle{width:28px;height:3px;border-radius:2px;background:rgba(255,255,255,0.18);margin:0 auto 6px;}

  .pad-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:5px;
  }

  /* Individual key — PURE DIV, not button, not input */
  .k{
    height:44px;border-radius:14px;
    background:rgba(255,255,255,0.05);
    color:var(--text);
    font-family:'Orbitron',monospace;font-size:1.15rem;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform 0.08s,background 0.08s;
    -webkit-user-select:none;user-select:none;
    position:relative;overflow:hidden;
  }
  .k:active{transform:scale(0.9);background:rgba(255,255,255,0.12);}

  .k-back{background:rgba(255,171,0,0.08);color:var(--warning);font-size:1.25rem;}
  .k-back:active{background:rgba(255,171,0,0.2);}

  .k-zero{grid-column:1/3;}

  .k-go{
    background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#fff));
    color:var(--bg);font-size:0.78rem;font-weight:900;letter-spacing:2px;
    box-shadow:0 2px 14px var(--accent-glow);
    grid-column:4;grid-row:3/5;border-radius:14px;
  }
  .k-go:active{transform:scale(0.94);box-shadow:0 4px 20px var(--accent-glow);}

  .k-clr{background:rgba(255,56,96,0.06);color:var(--danger);font-size:0.58rem;font-weight:700;letter-spacing:1.5px;}
  .k-clr:active{background:rgba(255,56,96,0.15);}

  .pad-safe{height:env(safe-area-inset-bottom,0px);background:#0f0f28;}

  /* ── End Overlay ── */
  #overlay{
    display:none;position:fixed;inset:0;
    background:rgba(10,10,26,0.92);backdrop-filter:blur(8px);z-index:200;
    flex-direction:column;align-items:center;justify-content:center;gap:18px;
    animation:fade-in 0.4s;
  }
  #overlay.show{display:flex;}
  .end-title{
    font-family:'Orbitron',monospace;font-size:clamp(1.4rem,5.5vw,2.4rem);
    font-weight:900;text-align:center;line-height:1.3;padding:0 20px;
  }
  .end-title.wt{
    background:linear-gradient(135deg,#00e676,#69f0ae);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;filter:drop-shadow(0 0 30px rgba(0,230,118,0.4));
  }
  .end-title.lt{color:var(--danger);filter:drop-shadow(0 0 30px rgba(255,56,96,0.4));-webkit-text-fill-color:var(--danger);}
  .end-sub{color:var(--muted);font-size:0.9rem;text-align:center;padding:0 24px;}
  .pa-btn{
    margin-top:8px;padding:14px 44px;font-family:'Orbitron',monospace;
    font-size:0.82rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    border:none;border-radius:14px;cursor:pointer;transition:transform 0.15s;
    -webkit-user-select:none;user-select:none;
  }
  .pa-btn:hover{transform:translateY(-2px);}
  .pa-btn.wb{background:linear-gradient(135deg,#00e676,#69f0ae);color:var(--bg);box-shadow:0 4px 24px rgba(0,230,118,0.3);}
  .pa-btn.lb{background:linear-gradient(135deg,#ff3860,#ff6b8a);color:#fff;box-shadow:0 4px 24px rgba(255,56,96,0.3);}
  @keyframes fade-in{from{opacity:0;}to{opacity:1;}}

  .confetti{position:fixed;width:10px;height:10px;z-index:300;animation:cfall linear forwards;pointer-events:none;}
  @keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

  .shake{animation:shake 0.4s ease-in-out;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}

  @media(max-width:380px){
    .game-wrap{padding:8px 10px 20px;gap:10px;}
    #num-box{font-size:1.8rem;min-height:52px;padding:10px 16px;max-width:220px;}
    .k{height:40px;font-size:1rem;}
    .pad-inner{padding:6px 10px 8px;}
    .heart{font-size:1.1rem;}
  }
  @media(min-height:780px){.k{height:48px;}}
</style>
</head>
<body class="mode-easy">

<div id="timer-track"><div id="timer-bar"></div></div>

<div class="game-scroll" id="gscroll">
<div class="game-wrap" id="gwrap">

  <div class="header">
    <h1>GUESS THE NUMBER</h1>
    <div class="sub">Beat the machine — if you can</div>
  </div>

  <div class="mode-row">
    <div class="mode-btn active" data-mode="easy">Easy</div>
    <div class="mode-btn" data-mode="medium">Medium</div>
    <div class="mode-btn" data-mode="hard">Hard</div>
  </div>

  <div class="stats">
    <div><div class="stat-label">Lives</div><div class="hearts" id="hearts"></div></div>
    <div><div class="stat-label">Guesses</div><div class="stat-val" id="gc">0</div></div>
    <div style="text-align:right"><div class="stat-label">Time</div><div class="stat-val" id="td">30</div></div>
  </div>

  <div class="range-display">Range: <em id="rlo">1</em> — <em id="rhi">100</em></div>

  <!-- PURE DIV — cannot trigger any keyboard anywhere -->
  <div id="num-box">
    <span id="digs"><span class="placeholder-txt">Tap here</span></span><span class="blink-cursor"></span>
  </div>

  <div class="hint-area" id="hint"></div>
  <div id="message">Pick a number and take your shot!</div>

  <div class="pu-section">
    <div class="pu-label">Power-ups (unlock every 5 guesses)</div>
    <div class="pu-row">
      <div class="pu" id="pu-double" data-pu="double">🔀 Double Range</div>
      <div class="pu" id="pu-reveal" data-pu="reveal">👁 Reveal Digit</div>
      <div class="pu" id="pu-life" data-pu="life">💖 Extra Life</div>
    </div>
  </div>

  <div class="hist" id="hist"></div>
  <div id="restart-btn">↻ Restart</div>

</div>
</div>

<!-- Numpad backdrop — PURE DIV -->
<div class="pad-bg" id="pbg"></div>

<!-- Numpad drawer — ALL DIVS, zero buttons, zero inputs -->
<div class="pad-drawer" id="pdraw">
<div class="pad-inner">
  <div class="pad-handle"></div>
  <div class="pad-grid" id="pgrid">
    <div class="k" data-v="1">1</div>
    <div class="k" data-v="2">2</div>
    <div class="k" data-v="3">3</div>
    <div class="k k-back" data-v="back">⌫</div>
    <div class="k" data-v="4">4</div>
    <div class="k" data-v="5">5</div>
    <div class="k" data-v="6">6</div>
    <div class="k k-go" data-v="go">GO</div>
    <div class="k" data-v="7">7</div>
    <div class="k" data-v="8">8</div>
    <div class="k" data-v="9">9</div>
    <div class="k k-zero" data-v="0">0</div>
    <div class="k k-clr" data-v="clr">CLR</div>
  </div>
</div>
<div class="pad-safe"></div>
</div>

<!-- End overlay -->
<div id="overlay">
  <div class="end-title" id="etitle"></div>
  <div class="end-sub" id="esub"></div>
  <div class="pa-btn" id="pa-btn">Play Again</div>
</div>

<script>
(function(){
"use strict";

/* ── Audio ── */
var AC=window.AudioContext||window.webkitAudioContext,ac;
function ea(){if(!ac)ac=new AC();}
function tone(f,d,t,v){
  ea();var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=t||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(v||0.1,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.start();o.stop(ac.currentTime+d);
}
function tick(){tone(900,0.04,'sine',0.05);}
function boing(){
  ea();var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type='sine';
  o.frequency.setValueAtTime(300,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.3);
  g.gain.setValueAtTime(0.3,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);
  o.start();o.stop(ac.currentTime+0.35);
}
function ding(){tone(1000,0.3,'triangle',0.2);}
function winSnd(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,0.3,'square',0.12);},i*120);});}
function loseSnd(){[400,350,300,200].forEach(function(f,i){setTimeout(function(){tone(f,0.35,'sawtooth',0.08);},i*200);});}

/* ── DOM refs ── */
var $=function(id){return document.getElementById(id);};
var numBox=$('num-box'), digs=$('digs'), msg=$('message');
var timerBar=$('timer-bar'), timerDisp=$('td'), gcDisp=$('gc');
var overlay=$('overlay'), etitle=$('etitle'), esub=$('esub');
var padBg=$('pbg'), padDraw=$('pdraw');

/* ── Pad open / close ── */
var padOpen=false;
function openPad(){
  if(S.over||padOpen)return;
  padBg.classList.add('open');
  padDraw.classList.add('open');
  numBox.classList.add('active');
  padOpen=true;
}
function closePad(){
  padBg.classList.remove('open');
  padDraw.classList.remove('open');
  numBox.classList.remove('active');
  padOpen=false;
}

numBox.addEventListener('click',function(e){e.preventDefault();openPad();});
padBg.addEventListener('click',function(e){e.preventDefault();closePad();});

/* ── Numpad key handling ── */
var buf='';
function updDisp(){
  digs.innerHTML=buf||'<span class="placeholder-txt">Tap here</span>';
}

$('pgrid').addEventListener('click',function(e){
  var el=e.target.closest('.k');
  if(!el)return;
  e.preventDefault();e.stopPropagation();
  var v=el.getAttribute('data-v');
  if(v==='go'){doGuess();return;}
  if(v==='back'){buf=buf.slice(0,-1);updDisp();return;}
  if(v==='clr'){buf='';updDisp();return;}
  if(S.over)return;
  if(buf.length>=3)return;
  if(buf===''&&v==='0')return;
  buf+=v;updDisp();tick();
});

/* Desktop keyboard */
document.addEventListener('keydown',function(e){
  if(S.over&&e.key!=='Enter')return;
  var k=e.key;
  if(k>='0'&&k<='9'){if(!padOpen)openPad();if(buf.length<3&&!(buf===''&&k==='0')){buf+=k;updDisp();tick();}}
  else if(k==='Backspace'){e.preventDefault();buf=buf.slice(0,-1);updDisp();}
  else if(k==='Enter'){doGuess();}
  else if(k==='Escape'){closePad();}
});

/* ── Mode buttons ── */
document.querySelector('.mode-row').addEventListener('click',function(e){
  var btn=e.target.closest('.mode-btn');
  if(!btn)return;
  setMode(btn.getAttribute('data-mode'));
});

/* ── Powerup buttons ── */
document.querySelector('.pu-row').addEventListener('click',function(e){
  var el=e.target.closest('.pu');
  if(!el)return;
  usePU(el.getAttribute('data-pu'));
});

/* ── Restart / Play Again ── */
$('restart-btn').addEventListener('click',function(){restart();});
$('pa-btn').addEventListener('click',function(){restart();});

/* ══════════════════════════════
   GAME
   ══════════════════════════════ */
var S={};
var TSEC=30;
var SH=["Too low! Aim higher! ⬆️","Nope — go UP! 🚀","Higher! ☝️","Low blow! 📈","Cute, but higher! 😏"];
var SL=["Too high! Bring it down! ⬇️","Whoa — lower! 🎯","Come down! 📉","LOWER! 😂","Chill! Too high! ❄️"];
var SC=["SO close! 🔥","Burning hot! 🥵","RIGHT there! 👀","Inches away! 💪"];
var SF=["Not even close! 🏚️","Different galaxy? 🌌","Grandma's better! 👵","Brave. And wrong. 😬"];
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function genSecret(m,mx){
  mx=mx||100;
  if(m==='easy')return Math.floor(Math.random()*mx)+1;
  if(m==='medium'){
    var w=[7,13,17,23,27,31,37,41,42,43,47,53,59,61,67,69,71,73,79,83,87,88,89,91,93,97];
    var v=w.filter(function(n){return n<=mx;});
    return v.length?pick(v):Math.floor(Math.random()*mx)+1;
  }
  if(m==='hard'){
    var skip={};var i;
    for(i=5;i<=mx;i+=5)skip[i]=1;
    [10,20,25,30,40,50,60,70,75,80,90,100].forEach(function(n){if(n<=mx)skip[n]=1;});
    var c=[];for(i=1;i<=mx;i++)if(!skip[i])c.push(i);
    return c.length?pick(c):Math.floor(Math.random()*mx)+1;
  }
  return Math.floor(Math.random()*mx)+1;
}

function init(){
  var mode=S.mode||'easy';
  S={mode:mode,secret:0,mx:100,lives:5,gc:0,guesses:[],over:false,
    ti:null,tl:TSEC,pups:{double:'locked',reveal:'locked',life:'locked'}};
  S.secret=genSecret(mode,100);
  buf='';updDisp();closePad();
  renderHearts();renderPU();
  gcDisp.textContent='0';
  $('hist').innerHTML='';
  $('hint').innerHTML='';
  msg.textContent='Pick a number and take your shot!';
  msg.className='';
  $('rlo').textContent='1';
  $('rhi').textContent='100';
  overlay.classList.remove('show');
  document.querySelectorAll('.confetti').forEach(function(c){c.remove();});
  startTimer();
  $('gscroll').scrollTop=0;
}

function setMode(mode){
  document.body.className='mode-'+mode;
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-mode')===mode);
  });
  S.mode=mode;restart();
}

function renderHearts(){
  var el=$('hearts');el.innerHTML='';
  for(var i=0;i<5;i++){
    var s=document.createElement('span');
    s.className='heart'+(i>=S.lives?' lost':'');
    s.textContent='❤️';el.appendChild(s);
  }
}

function startTimer(){
  clearInterval(S.ti);S.tl=TSEC;updT();
  S.ti=setInterval(function(){S.tl--;updT();if(S.tl<=0){clearInterval(S.ti);timeUp();}},1000);
}
function updT(){
  var p=(S.tl/TSEC)*100;
  timerBar.style.width=p+'%';
  timerBar.classList.toggle('urgent',S.tl<=8);
  timerDisp.textContent=S.tl;
}
function timeUp(){
  if(S.over)return;
  S.lives--;renderHearts();shake();boing();
  if(S.lives<=0)endGame(false);
  else{setMsg("⏱️ Time's up! Lost a life! "+S.lives+" left.",'lose');startTimer();}
}

function doGuess(){
  if(S.over)return;
  var val=parseInt(buf,10);
  if(isNaN(val)||val<1||val>S.mx){setMsg('Enter 1 – '+S.mx+'!','');shake();return;}
  closePad();

  S.gc++;gcDisp.textContent=S.gc;

  if(val===S.secret){
    clearInterval(S.ti);S.over=true;
    winSnd();addChip(val,'win');endGame(true);return;
  }

  S.lives--;renderHearts();S.guesses.push(val);
  var diff=Math.abs(val-S.secret),cl=diff<=5,hi=val<S.secret;
  Math.random()<0.5?boing():ding();shake();

  var m;
  if(cl)m=pick(SC)+(hi?' Go higher!':' Go lower!');
  else if(diff>30)m=pick(SF)+(hi?' Way higher!':' Way lower!');
  else m=hi?pick(SH):pick(SL);
  setMsg(m,hi?'hint-higher':'hint-lower');
  addChip(val,hi?'low':'high');

  if(S.lives<=0){clearInterval(S.ti);endGame(false);return;}
  if(S.gc%5===0&&S.gc>0)unlockPU();

  buf='';updDisp();startTimer();
  setTimeout(function(){msg.scrollIntoView({behavior:'smooth',block:'center'});},150);
}

function setMsg(t,c){msg.textContent=t;msg.className=c||'';}
function addChip(v,t){
  var c=document.createElement('span');c.className='chip '+t;
  c.textContent=v+(t==='low'?' ↑':t==='high'?' ↓':' ✓');
  $('hist').appendChild(c);
}

/* Powerups */
function unlockPU(){
  var lk=[];for(var k in S.pups)if(S.pups[k]==='locked')lk.push(k);
  if(!lk.length)return;
  for(var k2 in S.pups)if(S.pups[k2]==='avail')S.pups[k2]='locked';
  var ch=pick(lk);S.pups[ch]='avail';
  renderPU();
  var nm={double:'🔀 Double Range',reveal:'👁 Reveal Digit',life:'💖 Extra Life'};
  setMsg('⚡ Power-up: '+nm[ch]+'!','');ding();
}
function renderPU(){
  ['double','reveal','life'].forEach(function(k){
    var b=$('pu-'+k);b.className='pu';
    if(S.pups[k]==='avail')b.classList.add('avail');
    else if(S.pups[k]==='used')b.classList.add('used');
  });
}
function usePU(k){
  if(S.over||S.pups[k]!=='avail')return;
  S.pups[k]='used';ding();
  if(k==='double'){
    S.mx=200;S.secret=genSecret(S.mode,200);
    S.guesses=[];$('hist').innerHTML='';
    $('rhi').textContent='200';
    $('hint').innerHTML='';
    setMsg('🔀 Range doubled to 1–200! New secret!','');startTimer();
  }
  if(k==='reveal'){
    var s=String(S.secret),di=Math.floor(Math.random()*s.length);
    var m=s.split('').map(function(c,i){return i===di?c:'x';}).join('');
    $('hint').innerHTML='Digit hint: <span class="reveal-badge">'+m+'</span>';
    setMsg('👁 One digit revealed!','');
  }
  if(k==='life'){if(S.lives<5){S.lives++;renderHearts();}setMsg('💖 Extra life! '+S.lives+' lives!','');}
  renderPU();
}

/* End */
function endGame(won){
  S.over=true;clearInterval(S.ti);closePad();
  if(won){
    etitle.className='end-title wt';
    etitle.textContent='You nailed it! '+S.secret+' was right!';
    esub.textContent='Solved in '+S.gc+' guess'+(S.gc>1?'es':'')+' with '+S.lives+' lives. YES!';
    $('pa-btn').className='pa-btn wb';
    confetti();
  }else{
    etitle.className='end-title lt';
    etitle.textContent='You lost to a robot!';
    esub.textContent='The secret was '+S.secret+'. Better luck next time!';
    $('pa-btn').className='pa-btn lb';
    loseSnd();
  }
  overlay.classList.add('show');
}
function confetti(){
  var co=['#00e676','#69f0ae','#ffab00','#ff3860','#00d4ff','#b24aff','#fff'];
  for(var i=0;i<80;i++){
    var e=document.createElement('div');e.className='confetti';
    e.style.left=Math.random()*100+'vw';e.style.top='-10px';
    e.style.background=pick(co);e.style.borderRadius=Math.random()>0.5?'50%':'2px';
    e.style.width=(6+Math.random()*8)+'px';e.style.height=(6+Math.random()*8)+'px';
    e.style.animationDuration=(1.5+Math.random()*2)+'s';
    e.style.animationDelay=(Math.random()*0.8)+'s';
    document.body.appendChild(e);
    (function(el){setTimeout(function(){el.remove();},4000);})(e);
  }
}
function shake(){
  var w=$('gwrap');w.classList.remove('shake');w.offsetWidth;w.classList.add('shake');
}
function restart(){clearInterval(S.ti);init();}

init();
})();
</script>
</body>
</html>
